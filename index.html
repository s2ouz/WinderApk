<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B1020">
  <meta name="description" content="Matchwork ile yakınındaki işleri keşfet, eşleş, görüş ve takip et.">
  <title>Matchwork</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">

  <!-- Leaflet.js — gerçek harita -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- App styles -->
  <link rel="stylesheet" href="assets/styles.css?v=20260625-2">

  <!-- Leaflet dark tile override -->
  <style>
    .leaflet-container { background: #0A0E1A !important; }
    .leaflet-tile { filter: brightness(.55) saturate(.4) hue-rotate(190deg); }
    .leaflet-control-zoom a { background:#151B2E; color:#EEF2FF; border-color:#232C44; }
    .leaflet-control-zoom a:hover { background:#1C2338; }
    .leaflet-control-attribution { display:none; }
    /* Özel Matchwork pin */
    .mw-pin {
      display:flex; align-items:center; justify-content:center;
      min-width:44px; height:28px; border-radius:14px 14px 14px 2px;
      font-size:11px; font-weight:800; color:#fff;
      padding:0 8px; cursor:pointer;
      box-shadow:0 4px 14px rgba(0,0,0,.55);
      border:1.5px solid rgba(255,255,255,.2);
      transition:transform .15s; white-space:nowrap;
    }
    .mw-pin:hover { transform:scale(1.12); }
    .mw-pin.high { background:#22C55E; }
    .mw-pin.mid  { background:#8B5CFF; }
    .mw-pin.low  { background:#64748B; }
    .mw-pin.selected { box-shadow:0 0 0 4px rgba(255,255,255,.15),0 4px 16px rgba(0,0,0,.5); transform:scale(1.15); }
    .mw-user-pin { background:#6C4EFF; border:2.5px solid #fff; border-radius:50%;
      width:16px; height:16px;
      box-shadow:0 0 0 6px rgba(108,78,255,.25), 0 0 20px rgba(108,78,255,.4); }
  </style>
</head>
<body>
  <div class="device-shell">
    <main id="app" class="app-shell" aria-live="polite"></main>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase JS (opsiyonel — direkt fetch ile de çalışır) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Socket.io client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- API katmanı (Supabase + Socket.io bağlantısı) -->
  <script src="assets/api.js?v=20260625-2" defer></script>

  <!-- Ana uygulama -->
  <script src="assets/app.js?v=20260625-2" defer></script>
</body>
</html>
